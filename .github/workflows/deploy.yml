name: Deploy to AWS ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1 # Change to your AWS region
  ECR_REPOSITORY_BACKEND: <account-id>.dkr.ecr.<region>.amazonaws.com/ctf-backend
  ECR_REPOSITORY_FRONTEND: <account-id>.dkr.ecr.<region>.amazonaws.com/ctf-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        run: |
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REPOSITORY_BACKEND
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REPOSITORY_FRONTEND

      # Build, tag, and push backend
      - name: Build and push backend Docker image
        run: |
          docker build -t $ECR_REPOSITORY_BACKEND:latest ./backend
          docker push $ECR_REPOSITORY_BACKEND:latest

      # Build, tag, and push frontend
      - name: Build and push frontend Docker image
        run: |
          docker build -t $ECR_REPOSITORY_FRONTEND:latest ./ctf_ui
          docker push $ECR_REPOSITORY_FRONTEND:latest

      # Update ECS Service to use new image (backend)
      - name: Deploy to ECS Backend
        run: |
          aws ecs update-service \
            --cluster YOUR_ECS_CLUSTER_NAME \
            --service YOUR_BACKEND_SERVICE_NAME \
            --force-new-deployment

      # Update ECS Service to use new image (frontend)
      - name: Deploy to ECS Frontend
        run: |
          aws ecs update-service \
            --cluster YOUR_ECS_CLUSTER_NAME \
            --service YOUR_FRONTEND_SERVICE_NAME \
            --force-new-deployment
