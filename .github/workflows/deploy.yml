name: Deploy Backend to AWS ECS

on:
  push:
    branches:
      - dev

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY_BACKEND: 091295763720.dkr.ecr.ap-south-1.amazonaws.com/ctf-backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          ECR_REGISTRY=$(echo $ECR_REPOSITORY_BACKEND | cut -d'/' -f1)
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Build and push backend Docker image
        run: |
          docker build -t $ECR_REPOSITORY_BACKEND:latest ./backend
          docker push $ECR_REPOSITORY_BACKEND:latest

      - name: Deploy to ECS Backend
        run: |
          aws ecs update-service \
            --cluster ctf-cluster \
            --service ctf-backend-taskdef-service-xb8qbams \
            --force-new-deployment
